            const getGaugePosition = (bmi) => {
                if (bmi < 18.5) return (bmi / 18.5) * 18.5;
                if (bmi < 23) return 18.5 + ((bmi - 18.5) / (23 - 18.5)) * 13.5;
                if (bmi < 25) return 32 + ((bmi - 23) / (25 - 23)) * 11;
                if (bmi < 30) return 43 + ((bmi - 25) / (30 - 25)) * 20;
                const cappedBmi = Math.min(bmi, 40);
                return 63 + ((cappedBmi - 30) / (40 - 30)) * 37;
            };

            const gaugePosition = getGaugePosition(parseFloat(result.bmi));

            const getRandomItems = (array, count) => {
                const shuffled = [...array].sort(() => 0.5 - Math.random());
                return shuffled.slice(0, count);
            };

            const handleSnackCheck = () => {
                if (!showSnackCheck) {

                        </div>

                        {/* Step 2: Protein (Blue Theme) */}
                        <div className={`bg-blue-50/50 border border-blue-200 rounded-xl shadow-sm overflow-hidden`}>
                            <div className="p-4">
                                <h5 className="font-bold text-blue-800 flex justify-between items-center mb-2">
                                    <span className="flex items-center gap-2">
                                        <span className="bg-blue-100 p-1.5 rounded-lg"><Icon name="Dumbbell" size={16} className="text-blue-600"/></span>
                                        {isHealthy ? '2. โปรตีนสร้างกล้ามเนื้อ' : '2. เพิ่มโปรตีนมื้อแรก'}
                                    </span>
                                    <span className="text-[10px] font-bold bg-white text-blue-600 px-2 py-1 rounded-full border border-blue-100 shadow-sm">ทำได้เลย</span>
                                </h5>
                                <p className="text-sm text-gray-600 mb-3 pl-9">
                                    {isHealthy 
                                    ? 'เพิ่มมวลกล้ามเนื้อเพื่อเพิ่มอัตราการเผาผลาญพื้นฐาน (BMR)' 
                                    : 'โปรตีนช่วยเร่งการเผาผลาญและคุมหิวได้ดีที่สุด'}
                                </p>

                                <div className="pl-9">
                                    <button 
                                        onClick={handleProteinCheck}
                                        className="text-sm bg-white border border-blue-200 text-blue-600 px-4 py-2 rounded-lg w-full flex items-center justify-center hover:bg-blue-50 transition shadow-sm"
                                    >
                                        <span className="mr-2"><Icon name="Scale" size={16} /></span>
                                        {showProteinCheck ? 'ซ่อนคำนวณ' : 'คำนวณโปรตีนที่ควรได้รับ'}
                                    </button>

                                    {showProteinCheck && (
                                        <div className="mt-3 bg-white p-3 rounded-xl border border-blue-100 animate-fade-in">
                                            <div className="flex items-center justify-between mb-3 bg-blue-50 p-3 rounded-lg border border-blue-100">
                                                <span className="text-xs text-blue-600 font-semibold">เป้าหมายของคุณ</span>
                                                <div className="text-right">
                                                    <span className="text-xl font-bold text-blue-700">{proteinGoal}g</span>
                                                    <span className="text-[10px] text-blue-400 block -mt-1">โปรตีน/วัน</span>
                                                </div>
                                            </div>

                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-xs font-bold uppercase tracking-wide text-blue-400">แหล่งโปรตีนแนะนำ</span>
                                                <button onClick={shuffleProtein} className="text-gray-400 hover:text-blue-500">
                                                    <Icon name="RefreshCw" size={14} />
                                                </button>
                                            </div>
                                            
                                            <div className="space-y-2">
                                                {currentProteins.map((item, idx) => (
                                                    <div key={idx} className={`flex justify-between items-center p-2 rounded-lg border transition ${item.highlight ? 'bg-rose-50 border-rose-200' : 'border-transparent hover:bg-blue-50 hover:border-blue-100'}`}>
                                                        <div className="flex items-center">
                                                            <span className={`mr-3 p-1.5 rounded-full ${item.highlight ? 'bg-rose-100 text-rose-800' : 'bg-blue-50 text-blue-400'}`}><Icon name={item.icon} size={16} /></span>
                                                            <div>
                                                                <p className={`text-sm font-bold ${item.highlight ? 'text-rose-900' : 'text-gray-800'}`}>{item.name}</p>
                                                                <p className="text-[10px] text-gray-400">{item.kcal} kcal</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className={`text-sm font-bold ${item.highlight ? 'text-rose-800' : 'text-blue-600'}`}>{item.protein}g</span>
                                                            <span className="text-[10px] font-normal text-gray-400 block -mt-1">โปรตีน</span>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Locked Steps Overlay */}
                        <div className="relative pt-2">
                            <div className="opacity-40 blur-[2px] pointer-events-none space-y-3 select-none grayscale">
                                <div className="bg-gray-100 p-4 rounded-xl border border-gray-300">
                                    <h5 className="font-bold text-gray-700 flex gap-2"><span className="bg-gray-200 p-1 rounded">3.</span> {isHealthy ? 'เทคนิค Autophagy' : 'เทคนิค IF'}</h5>
                                    <p className="text-sm text-gray-500 mt-1">xxxxxxxxxxxxxxxxx</p>
                                </div>
                                <div className="bg-gray-100 p-4 rounded-xl border border-gray-300">
                                    <h5 className="font-bold text-gray-700 flex gap-2"><span className="bg-gray-200 p-1 rounded">4.</span> Zone 2 Training</h5>
                                    <p className="text-sm text-gray-500 mt-1">xxxxxxxxxxxxxxxxx</p>
                                </div>
                                <div className="bg-gray-100 p-4 rounded-xl border border-gray-300">
                                    <h5 className="font-bold text-gray-700 flex gap-2"><span className="bg-gray-200 p-1 rounded">5.</span> Deep Sleep</h5>
                                    <p className="text-sm text-gray-500 mt-1">xxxxxxxxxxxxxxxxx</p>
                                </div>
                            </div>

                            <div className="absolute inset-0 flex flex-col items-center justify-center z-10 -mt-6">
                                <div className="bg-white/95 backdrop-blur-sm p-6 rounded-2xl shadow-xl border border-gray-100 text-center max-w-xs mx-auto transform scale-100 hover:scale-105 transition-all duration-300">
                                    <div className="bg-gradient-to-br from-orange-100 to-orange-200 p-4 rounded-full inline-block mb-3 shadow-inner">
                                        <Icon name="Lock" size={32} className="text-orange-500" />
                                    </div>
                                    <h4 className="font-bold text-gray-800 text-lg mb-1">ปลดล็อก 3 ขั้นตอนที่เหลือ</h4>
                                    <p className="text-sm text-gray-500 mb-4">
                                        + <span className="text-rose-800 font-bold"><Icon name="Gift" size={14} className="inline mr-1"/> Bonus: สูตรลับ UP Labs</span><br/>
                                        เฉพาะบุคคล (Personalized)
                                    </p>
                                    <button 
                                        onClick={() => setStep(5)}
                                        className="w-full bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl transform transition flex items-center justify-center gap-2"
                                    >
                                        <Icon name="Unlock" size={18} /> กดเพื่อรับข้อมูลฟรี
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const LeadFormStep = ({ leadInfo, setLeadInfo, handleLeadSubmit, setStep }) => (
            <div className="space-y-6">
                <div className="text-center mb-6">
                    <div className="bg-rose-100 p-4 rounded-full inline-block mb-4">
                        <Icon name="Unlock" size={40} className="text-rose-800" />
                    </div>
                    <h2 className="text-2xl font-bold text-gray-800">ใกล้เสร็จแล้ว!</h2>
                    <p className="text-gray-600">
                        กรอกข้อมูลเพื่อรับ <strong>"3 ขั้นตอนสุดท้าย + โบนัสสูตรลับ"</strong> <br/>
                        ส่งตรงถึงมือคุณฟรี ทางไลน์/SMS
                    </p>
                </div>

                <form onSubmit={handleLeadSubmit} className="space-y-4">
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">ชื่อ - นามสกุล</label>
                        <div className="relative">
                            <input 
                                required
                                type="text" 
                                className="w-full p-3 border border-gray-300 rounded-lg pl-10 focus:ring-2 focus:ring-rose-500 focus:outline-none"
                                placeholder="สมชาย รักสุขภาพ"
                                value={leadInfo.name}
                                onChange={(e) => setLeadInfo(prev => ({...prev, name: e.target.value}))}
                            />
                            <div className="absolute left-3 top-3.5 text-gray-400"><Icon name="User" size={20} /></div>
                        </div>
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">เบอร์โทรศัพท์ (เพื่อรับ SMS)</label>
                        <div className="relative">
                            <input 
                                required
                                type="tel" 
                                className="w-full p-3 border border-gray-300 rounded-lg pl-10 focus:ring-2 focus:ring-rose-500 focus:outline-none"
                                placeholder="081-234-5678"
                                value={leadInfo.phone}
                                onChange={(e) => setLeadInfo(prev => ({...prev, phone: e.target.value}))}
                            />
                            <div className="absolute left-3 top-3.5 text-gray-400"><Icon name="Phone" size={20} /></div>
                        </div>
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Line ID (เพื่อรับสูตรลับฉบับเต็ม)</label>
                        <div className="relative">
                            <input 
                                type="text" 
                                className="w-full p-3 border border-gray-300 rounded-lg pl-10 focus:ring-2 focus:ring-rose-500 focus:outline-none"
                                placeholder="@lineid"
                                value={leadInfo.lineId}
                                onChange={(e) => setLeadInfo(prev => ({...prev, lineId: e.target.value}))}
                            />
                            <div className="absolute left-3 top-3.5 text-gray-400"><Icon name="MessageSquare" size={20} /></div>
                        </div>
                    </div>

                    <button 
                        type="submit"
                        className="w-full bg-rose-800 hover:bg-rose-900 text-white font-bold py-4 rounded-xl shadow-lg mt-6 transition-colors"
                    >
                        ยืนยันรับสูตรลับฟรี
                    </button>
                </form>
                
                <button onClick={() => setStep(4)} className="w-full text-center text-gray-500 text-sm mt-4">
                    ย้อนกลับไปดูผล BMI
                </button>
            </div>
        );

        const ThankYouStep = ({ leadInfo }) => (
            <div className="text-center py-10 space-y-6">
                <div className="bg-green-100 p-6 rounded-full inline-block mb-4">
                    <Icon name="CheckCircle" size={80} className="text-green-600" />
                </div>
                <h2 className="text-3xl font-bold text-gray-800">ส่งข้อมูลสำเร็จ!</h2>
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 max-w-sm mx-auto">
                    <p className="text-gray-600 mb-2">เราได้ส่ง <strong>"5 ขั้นตอน + โบนัสสูตรลับ"</strong> ไปที่:</p>
                    <div className="space-y-1 mt-4">
                        <p className="font-bold text-lg text-rose-900">{leadInfo.name}</p>
                        <p className="text-gray-800 flex items-center justify-center gap-2">
                            <Icon name="MessageSquare" size={16} /> {leadInfo.lineId || '-'}
                        </p>
                        <p className="text-gray-800 flex items-center justify-center gap-2">
                            <Icon name="Phone" size={16} /> {leadInfo.phone}
                        </p>
                    </div>
                </div>
                <p className="text-sm text-gray-500 mt-8 px-4">
                    "ความรู้ที่ถูกต้อง คือจุดเริ่มต้นของการมีสุขภาพที่ดีตลอดชีวิต"
                </p>
                <button 
                    onClick={() => window.location.reload()}
                    className="text-rose-800 font-semibold underline mt-4"
                >
                    กลับหน้าหลัก
                </button>
            </div>
        );

        // --- Main Component ---
        function MetabolicHealthCheck() {
            const [step, setStep] = useState(0);
            const [loading, setLoading] = useState(false);
            const [formData, setFormData] = useState({
                gender: 'female',
                age: '',
                height: '',
                weight: '',
                waist: '',
                activity: 'sedentary',
                symptoms: []
            });
            const [result, setResult] = useState(null);
            const [leadInfo, setLeadInfo] = useState({
                name: '',
                phone: '',
                lineId: ''
            });
            const [submitted, setSubmitted] = useState(false);

            const getBMICategory = (bmi) => {
                if (bmi < 18.5) return { label: 'น้ำหนักน้อยเกินไป', color: 'text-blue-500', bg: 'bg-blue-500', advice: 'ควรเพิ่มน้ำหนักเพื่อความแข็งแรงของกล้ามเนื้อ' };
                if (bmi < 23) return { label: 'น้ำหนักปกติ (สมส่วน)', color: 'text-green-500', bg: 'bg-green-500', advice: 'รักษาระดับนี้ไว้ เพื่อระบบเผาผลาญที่ดี' };
                if (bmi < 25) return { label: 'น้ำหนักเกิน (ท้วม)', color: 'text-yellow-500', bg: 'bg-yellow-500', advice: 'เริ่มมีความเสี่ยง ควรปรับอาหารเพื่อลดไขมันสะสม' };
                if (bmi < 30) return { label: 'อ้วนระดับ 1', color: 'text-orange-500', bg: 'bg-orange-500', advice: 'ควรเริ่มโปรแกรมรีเซ็ตระบบเผาผลาญอย่างจริงจัง' };
                return { label: 'อ้วนระดับ 2 (อันตราย)', color: 'text-red-500', bg: 'bg-red-500', advice: 'มีความเสี่ยงต่อโรคเรื้อรังสูง ควรปรึกษาผู้เชี่ยวชาญทันที' };
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const toggleSymptom = (symptom) => {
                setFormData(prev => {
                    const exists = prev.symptoms.includes(symptom);
                    return {
                        ...prev,
                        symptoms: exists 
                        ? prev.symptoms.filter(s => s !== symptom)
                        : [...prev.symptoms, symptom]
                    };
                });
            };

            const calculateResult = () => {
                setLoading(true);
                setTimeout(() => {
                    const heightM = parseFloat(formData.height) / 100;
                    const weightKg = parseFloat(formData.weight);
                    const waistInches = parseFloat(formData.waist);
                    const waistCm = waistInches * 2.54;
                    const heightCm = parseFloat(formData.height);
                    
                    const bmi = weightKg / (heightM * heightM);
                    
                    // BMI Asian Standard for Normal: 18.5 - 22.9
                    const minIdealWeight = 18.5 * (heightM * heightM);
                    const maxIdealWeight = 22.9 * (heightM * heightM);

                    const idealWeight = 22 * (heightM * heightM); // Target 22
                    const diff = weightKg - idealWeight;
                    
                    const whtr = waistCm / heightCm;
                    const whtrStatus = whtr > 0.5 ? 'risk' : 'normal';

                    setResult({
                        bmi: bmi.toFixed(1),
                        idealWeight: idealWeight.toFixed(1),
                        minIdealWeight: minIdealWeight.toFixed(1),
                        maxIdealWeight: maxIdealWeight.toFixed(1),
                        diff: diff.toFixed(1),
                        category: getBMICategory(bmi),
                        whtr: whtr.toFixed(2),
                        whtrStatus: whtrStatus
                    });
                    setLoading(false);
                    setStep(4);
                }, 1500);
            };

            // --- POST to UP Wellness Ops API (saves with coach attribution) ---
            const saveToSupabase = async (contactData) => {
                try {
                    const params = new URLSearchParams(window.location.search);
                    const coachId = params.get('coach') || null;
                    await fetch('/api/check/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            coach_id: coachId,
                            quiz_type: 'healthcheck',
                            name: contactData.name,
                            phone: contactData.phone,
                            line_id: contactData.lineId,
                            consent_followup: true,
                            answers: {
                                age:       formData.age ? +formData.age : undefined,
                                gender:    formData.gender,
                                height_cm: formData.height ? +formData.height : undefined,
                                weight_kg: formData.weight ? +formData.weight : undefined,
                                waist_cm:  formData.waist  ? +formData.waist  : undefined,
                                exercise_freq: formData.activity,
                                symptoms:  formData.symptoms,
                            },
                        }),
                    });
                    console.log("Lead saved via UP Wellness Ops API");
                } catch (err) {
                    console.error("Save error:", err);
                }
            };

            const handleLeadSubmit = (e) => {
                e.preventDefault();
                // BACKDOOR: Check for secret name
                if(leadInfo.name.trim().toLowerCase() === 'iamdiamond') {
                    setStep(99); // Go to Report Dashboard
                    return;
                }

                saveToSupabase(leadInfo);
                setSubmitted(true);
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 font-sans">
                    <div className={`w-full bg-white rounded-3xl shadow-xl overflow-hidden relative ${step === 99 ? 'max-w-4xl' : 'max-w-md'}`}>
                        {step > 0 && step < 6 && !submitted && (
                            <div className="h-2 bg-gray-100">
                                <div 
                                    className="h-full bg-rose-500 transition-all duration-500 ease-out"
                                    style={{ width: `${(step / 5) * 100}%` }}
                                ></div>
                            </div>
                        )}

                        <div className={`${step === 99 ? 'p-0' : 'p-6 md:p-8'}`}>
                            {loading ? (
                                <div className="text-center py-20">
                                    <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-rose-500 mx-auto mb-4"></div>
                                    <h3 className="text-xl font-bold text-gray-700">กำลังวิเคราะห์ข้อมูล...</h3>
                                    <p className="text-gray-500">ประมวลผลค่า BMI และไขมันช่องท้อง (Visceral Fat)</p>
                                </div>
                            ) : (
                                <>
                                    {step === 0 && <WelcomeStep setStep={setStep} />}
                                    {step === 1 && <BasicInfoStep formData={formData} setFormData={setFormData} handleInputChange={handleInputChange} setStep={setStep} />}
                                    {step === 2 && <ActivityStep formData={formData} setFormData={setFormData} setStep={setStep} />}
                                    {step === 3 && <SymptomsStep formData={formData} toggleSymptom={toggleSymptom} setStep={setStep} calculateResult={calculateResult} />}
                                    {step === 4 && result && <ResultStep result={result} formData={formData} setStep={setStep} />}
                                    {step === 5 && !submitted && <LeadFormStep leadInfo={leadInfo} setLeadInfo={setLeadInfo} handleLeadSubmit={handleLeadSubmit} setStep={setStep} />}
                                    {submitted && <ThankYouStep leadInfo={leadInfo} />}
                                    
                                    {/* Report Dashboard (Secret Step) */}
                                    {step === 99 && <ReportDashboard setStep={setStep} />}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MetabolicHealthCheck />);
    </script>
</body>
</html>
